<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraPlan - Planejamento de Terrenos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">
                <i class="fas fa-map-marked-alt"></i>
                <h1>TerraPlan</h1>
            </div>
            <div class="controls">
                <button id="save-btn" title="Salvar Projeto"><i class="fas fa-save"></i> Salvar</button>
                <button id="backup-btn" title="Exportar Arquivo"><i class="fas fa-file-download"></i> Backup</button>
                <button id="import-btn" title="Importar Arquivo"><i class="fas fa-file-upload"></i> AbrirPlan</button>
                <input type="file" id="import-input" style="display: none;" accept=".json">
                <button id="clear-btn" title="Limpar Mapa"><i class="fas fa-trash-alt"></i> Limpar</button>
            </div>
        </header>

        <main>
            <aside id="sidebar">
                <div class="sidebar-header">
                    <h2>Objetos</h2>
                    <p>Selecione um item e marque no mapa</p>
                </div>
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="all">Tudo</button>
                    <button class="tab-btn" data-tab="build">Obras</button>
                    <button class="tab-btn" data-tab="nature">Verde</button>
                    <button class="tab-btn" data-tab="infra">Infra</button>
                </div>

                <div class="object-grid" id="main-grid">
                    <button class="obj-btn active" data-type="null" title="Navegar">
                        <i class="fas fa-mouse-pointer"></i>
                        <span>Navegar</span>
                    </button>
                    
                    <button class="obj-btn" data-type="house" data-cat="build" title="Casa">
                        <i class="fas fa-home"></i>
                        <span>Casa</span>
                    </button>
                    <button class="obj-btn" data-type="garage" data-cat="build" title="Garagem">
                        <i class="fas fa-warehouse"></i>
                        <span>Garagem</span>
                    </button>
                    <button class="obj-btn" data-type="plantation" data-cat="nature" title="Plantação">
                        <i class="fas fa-seedling"></i>
                        <span>Plantação</span>
                    </button>
                    <button class="obj-btn" data-type="coconut" data-cat="nature" title="Coqueiro">
                        <i class="fas fa-tree"></i>
                        <span>Coqueiro</span>
                    </button>
                    <button class="obj-btn" data-type="cashew" data-cat="nature" title="Cajueiro">
                        <i class="fas fa-leaf"></i>
                        <span>Cajueiro</span>
                    </button>
                    <button class="obj-btn" data-type="mango" data-cat="nature" title="Mangueira">
                        <i class="fas fa-spa"></i>
                        <span>Mangueira</span>
                    </button>
                    <button class="obj-btn" data-type="water-tank" data-cat="infra" title="Caixa d'Água">
                        <i class="fas fa-faucet-drip"></i>
                        <span>Cx Água</span>
                    </button>
                    <button class="obj-btn" data-type="irrigation" data-cat="infra" title="Sist. Irrigação">
                        <i class="fas fa-sprinkler"></i>
                        <span>Irrigação</span>
                    </button>
                    <button class="obj-btn" data-type="well" data-cat="infra" title="Poço">
                        <i class="fas fa-bore-hole"></i>
                        <span>Poço</span>
                    </button>
                    <button class="obj-btn" data-type="light" data-cat="infra" title="Poste de Luz">
                        <i class="fas fa-lightbulb"></i>
                        <span>Poste</span>
                    </button>
                </div>

                <div class="sidebar-tools">
                    <h3 style="font-size: 0.8rem; margin: 10px 0; color: var(--text-gray);">Ferramentas</h3>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                        <button class="tool-btn" id="measure-btn" title="Medir Distância"><i class="fas fa-ruler"></i><br><span style="font-size: 9px;">Medir</span></button>
                        <button class="tool-btn" id="fence-btn" title="Criar Cercas"><i class="fas fa-border-style"></i><br><span style="font-size: 9px;">Cerca</span></button>
                        <button class="tool-btn" id="pipe-btn" title="Tubulações"><i class="fas fa-water"></i><br><span style="font-size: 9px;">Cano</span></button>
                        <button class="tool-btn" id="list-btn" title="Lista de Materiais"><i class="fas fa-clipboard-list"></i><br><span style="font-size: 9px;">Lista</span></button>
                        <button class="tool-btn" id="grid-btn" title="Alternar Grade"><i class="fas fa-border-all"></i><br><span style="font-size: 9px;">Grade</span></button>
                        <button class="tool-btn" id="export-btn" title="Exportar Mapa"><i class="fas fa-file-export"></i><br><span style="font-size: 9px;">Exportar</span></button>
                    </div>
                </div>
                
                <div class="sidebar-footer">
                    <h3>Propriedades</h3>
                    <div id="item-info">
                        <p class="placeholder-text">Clique em algo no mapa</p>
                    </div>
                </div>
            </aside>

            <section id="map-container">
                <div id="map"></div>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js"></script>
</body>
</html>
